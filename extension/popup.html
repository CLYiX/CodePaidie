<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CodePaidie</h1>
    <span class="version">v2.0</span>
  </div>

  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="form-group">
    <label>Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://127.0.0.1:8000">
  </div>

  <div class="form-group">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>

  <div class="form-group">
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
      <span>Enable on this site</span>
    </label>
  </div>

  <div class="form-group">
    <label class="toggle">
      <input type="checkbox" id="autoInject" checked>
      <span class="slider"></span>
      <span>Auto-inject system prompt</span>
    </label>
  </div>

  <button class="btn" id="saveBtn">Save</button>
  <div class="hint" id="saveHint"></div>

  <div class="sites">
    <div class="sites-title">Supported Sites</div>
    <div class="site-list" id="siteList"></div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
